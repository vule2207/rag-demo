version: '3.8'
services:
  # --- Frontend Application ---
  console:
    build:
      context: ./apps/console
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mcp-bridge
      - rag-engine
    networks:
      - app-net

  # --- Agentic RAG Engine ---
  rag-engine:
    build:
      context: ./services/rag-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - MCP_URL=http://mcp-bridge:3000/api/mcp/execute
    volumes:
      - ./services/rag-engine/papers:/app/papers
      - ./services/rag-engine/faiss_index:/app/faiss_index
    networks:
      - app-net

  # --- MCP Connection Bridge ---
  mcp-bridge:
    build:
      context: ./services/mcp-bridge
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
