version: '3.8'
services:
  # --- Frontend Application ---
  console:
    container_name: console
    build:
      context: ./apps/console
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mcp-bridge
      - rag-engine
    networks:
      - app-net

  # --- Agentic RAG Engine ---
  rag-engine:
    container_name: rag-engine
    build:
      context: ./services/rag-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_URL=http://mcp-bridge:3000/api/mcp/execute
      - LANGCHAIN_HUB_DANGEROUSLY_PULL_PUBLIC_PROMPT=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./services/rag-engine:/app
      - ./services/rag-engine/papers:/app/papers
      - ./services/rag-engine/faiss_index:/app/faiss_index
      - ./services/rag-engine/storage:/app/storage
    depends_on:
      - mcp-bridge
    networks:
      - app-net

  # --- MCP Connection Bridge ---
  mcp-bridge:
    container_name: mcp-bridge
    build:
      context: ./services/mcp-bridge
      dockerfile: Dockerfile
      target: server-builder
    ports:
      - "3000:3000"
    command: >
      sh -c "npm install && npm run start:dev"
    volumes:
      - ./services/mcp-bridge:/app
      - /app/node_modules
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
